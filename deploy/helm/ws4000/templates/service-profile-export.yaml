{{- if .Values.profileExport.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ws4000.fullname" . }}-profile-export
  labels:
    {{- include "ws4000.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ws4000.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.profileExport.port }}
      targetPort: http
{{- end }}
