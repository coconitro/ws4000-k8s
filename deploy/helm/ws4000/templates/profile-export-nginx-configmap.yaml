{{- if .Values.profileExport.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ws4000.fullname" . }}-profile-export-nginx
  labels:
    {{- include "ws4000.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        autoindex off;

        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location = /index.html {
            root /usr/share/nginx/html;
        }

        location ^~ /export/ {
            alias /export/;
            default_type application/octet-stream;
        }

        location = /export/profile.dat {
            alias /export/profile.dat;
            default_type application/octet-stream;
            add_header Content-Disposition 'attachment; filename="profile.dat"';
        }

        {{- if .Values.novnc.enabled }}
        location / {
            proxy_pass http://127.0.0.1:{{ .Values.novnc.port }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        {{- end }}
    }
  index.html: |
{{ .Files.Get "static/index.html" | replace "__KICK_CHANNEL_SLUG__" (.Values.kick.channelSlug | default "") | indent 4 }}
{{- end }}
