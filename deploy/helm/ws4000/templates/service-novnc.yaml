{{- if .Values.novnc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ws4000.fullname" . }}-novnc
  labels:
    {{- include "ws4000.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ws4000.selectorLabels" . | nindent 4 }}
  ports:
    - name: novnc
      port: {{ .Values.novnc.port }}
      targetPort: novnc
{{- end }}
