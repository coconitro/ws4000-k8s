{{- if .Values.taiganetTimeProxy.enabled }}
{{- $secretName := printf "%s-taiganet-time-proxy" (include "ws4000.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $ca := genCA (printf "%s-taiganet-proxy-ca" (include "ws4000.fullname" .)) 3650 }}
{{- $cert := genSignedCert "www.taiganet.com" (list "127.0.0.1") (list "www.taiganet.com" "taiganet.com") 365 $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "ws4000.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existing $existing.data }}
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
  ca.crt: {{ index $existing.data "ca.crt" }}
  {{- else }}
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $ca.Cert | b64enc }}
  {{- end }}
{{- end }}
